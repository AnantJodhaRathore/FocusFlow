name: focusflow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Core UI & Style
  cupertino_icons: ^1.0.8

  # Local Database & Utilities
  collection: ^1.19.1
  ffi: ^2.1.4
  fl_chart: ^1.2.0
  intl: ^0.20.2
  path: ^1.9.1
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  win32: ^5.15.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  shared_preferences: ^2.5.5
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

fonts:
  - family: Inter
    fonts:
      - asset: assets/fonts/Inter-Variable.ttf
  - family: DMSans
    fonts:
      - asset: assets/fonts/DMSans-Variable.ttf

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/focusflow_icon.png"
  adaptive_icon_background: "#090B12"
  adaptive_icon_foreground: "assets/icons/focusflow_icon.png"